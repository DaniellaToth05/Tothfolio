<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniella Toth - Software Engineer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,300;1,400&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>

    <!-- intro buffer / loading screen -->
    <div id="intro">
      <canvas id="intro-canvas"></canvas>
    </div>

    <!-- add star canvas -->
     <canvas id="star-canvas"></canvas>

     <div id="content">
      <div id="earth-glow"></div>
      <div id="earth-wrap">
        <!-- earth model -->
         <model-viewer id="earth-mv" src="assets/model-4.glb" auto-rotate rotation-per-second="1.5deg" environment-image="neutral" shadow-intensity="0" interaction-prompt="none" camera-controls="false" disable-top disable-zoom alt="Earth"></model-viewer>
      </div>
      <div id="horizon-haze"></div>
     </div>

    <script src="index.js"></script>
  </body>
</html>
