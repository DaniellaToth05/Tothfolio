<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniella Toth - Software Engineer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@200;300;400&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>

    <!-- intro buffer / loading screen -->
    <div id="intro">
      <canvas id="intro-canvas"></canvas>
    </div>

    <!-- add star canvas -->
     <canvas id="star-canvas"></canvas>

     <div id="content">
      <div id="earth-glow"></div>
      <div id="earth-wrap">
        <!-- earth model -->
         <model-viewer id="earth-mv" src="assets/model-4.glb" auto-rotate rotation-per-second="1.5deg" environment-image="neutral" shadow-intensity="0" interaction-prompt="none" camera-controls="false" disable-tap disable-zoom camera-orbit="0deg 88deg auto" camera-target="0m 6.35m 0.74m" field-of-view="18deg" alt="Earth"></model-viewer>
      </div>

      <div id="rocket-on-earth">
        <div id="rocket-exhaust">
          <div class="exhaust-flame flame-outer"></div>
          <div class="exhaust-flame flame-mid"></div>
          <div class="exhaust-flame flame-core"></div>
        </div>
        <model-viewer id="rocket-mv" src="assets/Saturn-V.glb" environment-image="neutral" shadow-intensity="0.5" shadow-softness="0.8" exposure="1.2" interaction-prompt="none" camera-controls="none" disable-tap disable-zoom alt="Saturn-V Rocket"></model-viewer>
        <div id="launch-pad"></div>
      </div>
      <div id="horizon-haze"></div>
     </div>

     <div id="landing-info">
      <div class="top-tag">Software Engineer</div>
      <h1 class="landing-name">Daniella Toth</h1>
      <div class="landing-role">// Full-Stack &nbsp;&middot;&nbsp; AI Emphasis &nbsp;&middot;&nbsp; UofG</div>
      <button id="launch-btn"><span>&#8593; Launch</span></button>
     </div>

     <div class="coords">
      SECTOR <span>SOL-1</span> &nbsp;&middot;&nbsp; EARTH ORBIT<br>
      STATUS <span class="blink">&#9632;</span> <span>AVAILABLE FOR HIRE</span>
    </div>

    <script src="index.js"></script>
  </body>
</html>
