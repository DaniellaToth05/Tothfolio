<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniella Toth // Solar System</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@200;300;400&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="page.css">
  </head>

  <body>

    <!-- boot sequence to let page load -->
     <div id="boot">
      <div class="boot-line gold" style="animation-delay: 0.00s">&#9672; SOLAR NAVIGATION SYSTEM v3.0.0</div>
      <div class="boot-line dim" style="animation-delay: 0.12s">Loading model-viewer engine ............ <span style="color: #7adca0">OK</span></div>
      <div class="boot-line dim" style="animation-delay: 0.24s">Mounting local planetary models ........ <span style="color: #7adca0">OK</span></div>
      <div class="boot-line dim" style="animation-delay: 0.36s">Initializing star charts ............... <span style="color: #7adca0">OK</span></div>
      <div class="boot-line" style="animation-delay: 0.50s">Calibrating rocket thrusters ........... <span style="color: #7adca0">OK</span></div>
      <div class="boot-line dim" style="animation-delay: 0.64s">Mapping mission sectors ................ <span style="color: #7adca0">OK</span></div>
      <div class="boot-line gold" style="animation-delay: 0.80s">NAVIGATION ONLINE &#8212; <span class="blink">EXPLORE THE SYSTEM</span></div>
      <div class="boot-bar-wrap">
        <div class="boot-bar"></div>
      </div>
    </div>

    <canvas id="star-canvas"></canvas>
    <div id="galaxy"></div>

    <script src="page.js"></script>
  </body>
</html>
